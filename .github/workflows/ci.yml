name: CI

on:
  push:
    branches:
      - '**'
      - '!master'

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml

  release-dry-run:
    needs: [lint, test]
    uses: ./.github/workflows/release.yml
    with:
      dry-run: true
